<!doctype html>
<html lang="ko">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>학부모 로그인 · 1a</title>
<script>/* 캐시버스팅: app.js·styles.css 항상 최신 (프로토타입) */

document.write('<script defer src="../app.js'+v+'"><\/script>');})();</script>
</head>
<body>
<div class="proto-bar">
  <a class="back" href="../index.html" onclick="if(history.length>1){history.back();return false}">← 뒤로</a>

</div>

<div class="stage">

        <span style="text-decoration:underline;text-underline-offset:3px">비밀번호 재설정</span><span style="color:#d5d1cb">|</span>
        <a href="login.html" style="color:var(--mute);text-decoration:underline;text-underline-offset:3px">직원 로그인</a>
