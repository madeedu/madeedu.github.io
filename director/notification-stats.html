<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>알림 발송 현황 · n47</title>
<script>/* 캐시버스팅: app.js·styles.css 항상 최신 (프로토타입) */
(function(){var v='?v='+Date.now();
document.write('<link rel="stylesheet" href="../styles.css'+v+'">');
document.write('<script defer src="../app.js'+v+'"><\/script>');})();</script>
<style>
  .bar{height:10px;border-radius:999px;background:var(--line2);overflow:hidden}
  .bar > span{display:block;height:100%;border-radius:999px}
  .brow{display:grid;grid-template-columns:120px 1fr 60px;gap:12px;align-items:center;padding:10px 0}
  .brow .v{text-align:right;font-weight:700;font-size:14px}
  .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px}
  .kpi{background:#fff;border:1px solid var(--line2);border-radius:16px;padding:18px}
  .kpi .cap{font-size:13px;color:var(--mute);font-weight:600}
  .kpi .num{font-size:26px;font-weight:800;margin-top:6px}
</style>
</head>
<body>
<div class="proto-bar">
  <a class="back" href="dashboard.html" onclick="if(history.length>1){history.back();return false}">← 뒤로</a>
  <span class="title">알림 발송 현황</span><span class="nid">n47</span>
  <span class="spacer"></span>
  <a class="list" href="../index.html">≡ 목록</a>
</div>

<div class="stage">
  <div class="desk-shell">
    <div class="shell-topbar">
      <div class="brand"><span class="logo">MADE <span class="r">LMS</span></span><span class="sep">|</span><span>원장</span></div>
      <div style="display:flex;align-items:center;gap:12px"><span class="small">오늘</span><div class="avatar">원</div></div>
    </div>
    <div class="shell-main">
      <nav class="shell-side">
        <div class="sect">원장 · 세이노 대치</div>
        <a href="dashboard.html"><span class="ic">📊</span>대시보드</a>
        <a href="enrollment-stats.html"><span class="ic">👥</span>재원/출석률</a>
        <a href="consult-stats.html"><span class="ic">💬</span>상담 건수</a>
        <a href="notification-stats.html" class="on"><span class="ic">🔔</span>알림 발송</a>
      </nav>
      <div class="shell-content">
        <div class="ct-head"><h1>알림 발송 현황</h1><span class="small">오늘 · 총 214건</span></div>
        <div class="kpis">
          <div class="kpi"><div class="cap">총 도달률</div><div class="num" style="color:var(--ok)">97%</div></div>
          <div class="kpi"><div class="cap">푸시 도달</div><div class="num">180</div></div>
          <div class="kpi"><div class="cap">SMS 폴백</div><div class="num">34</div></div>
        </div>
        <div class="card">
          <b>채널별 발송·열람</b>
          <div style="margin-top:12px">
            <div class="brow"><span>푸시 발송</span><div class="bar"><span style="width:84%;background:var(--ink)"></span></div><span class="v">180</span></div>
            <div class="brow"><span>푸시 열람</span><div class="bar"><span style="width:61%;background:var(--ok)"></span></div><span class="v">131</span></div>
            <div class="brow"><span>SMS 발송</span><div class="bar"><span style="width:16%;background:var(--warn)"></span></div><span class="v">34</span></div>
            <div class="brow"><span>중요(결석)</span><div class="bar"><span style="width:9%;background:var(--red)"></span></div><span class="v">19</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
